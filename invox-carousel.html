<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INVOX Carousel — तुझ्या images अपलोड कर</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mukta:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Mukta','Segoe UI',sans-serif;background:radial-gradient(1000px 500px at 50% -8%,#12224a,#080d1a 62%);color:#e8eefb;min-height:100vh;padding:22px 14px 44px;display:flex;flex-direction:column;align-items:center;}
.hd{text-align:center;margin-bottom:18px;}
.hd h1{font-size:19px;font-weight:800;}
.hd p{font-size:12.5px;color:#94a3c8;margin-top:4px;}

/* upload zone (empty state) */
.drop{width:min(92vw,440px);aspect-ratio:1/1;border:2px dashed #34456e;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;text-align:center;color:#aebbdd;cursor:pointer;transition:.15s;padding:24px;}
.drop:hover,.drop.hot{border-color:#4f93ff;background:rgba(79,147,255,.06);color:#dbe8ff;}
.drop .big{font-size:40px;}
.drop b{font-size:16px;font-weight:800;color:#e8eefb;}
.drop span{font-size:13px;}

/* carousel */
.frame{width:min(92vw,440px);aspect-ratio:1/1;border-radius:24px;overflow:hidden;position:relative;background:#0c1424;box-shadow:0 36px 80px -28px rgba(2,10,30,.8);display:none;}
.track{display:flex;height:100%;transition:transform .45s cubic-bezier(.5,.05,.2,1);}
.cell{min-width:100%;height:100%;}
.cell img{width:100%;height:100%;object-fit:cover;display:block;}
.nav{position:absolute;top:50%;transform:translateY(-50%);width:40px;height:40px;border-radius:50%;border:none;background:rgba(10,15,30,.55);color:#fff;font-size:22px;cursor:pointer;display:grid;place-items:center;backdrop-filter:blur(4px);z-index:3;}
.nav:hover{background:rgba(10,15,30,.8);}
.nav.prev{left:10px;} .nav.next{right:10px;}
.counter{position:absolute;top:12px;right:12px;background:rgba(10,15,30,.55);color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:100px;z-index:3;backdrop-filter:blur(4px);}
.dots{display:flex;gap:7px;margin-top:14px;flex-wrap:wrap;justify-content:center;max-width:340px;}
.dots button{width:8px;height:8px;border-radius:50%;border:none;background:#2f3f66;cursor:pointer;padding:0;transition:.2s;}
.dots button.on{width:22px;border-radius:5px;background:#4f93ff;}

/* thumbnails */
.thumbs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;max-width:min(92vw,460px);margin-top:18px;}
.thumb{width:56px;height:56px;border-radius:10px;overflow:hidden;position:relative;border:2px solid transparent;cursor:grab;flex:none;}
.thumb.sel{border-color:#4f93ff;}
.thumb img{width:100%;height:100%;object-fit:cover;pointer-events:none;}
.thumb .x{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.65);color:#fff;border:none;font-size:12px;line-height:1;cursor:pointer;display:grid;place-items:center;}
.thumb .n{position:absolute;bottom:2px;left:3px;font-size:10px;font-weight:800;color:#fff;text-shadow:0 1px 3px #000;}

.actions{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;justify-content:center;}
.btn{font-family:'Mukta';font-weight:700;font-size:14px;padding:11px 18px;border-radius:11px;border:1px solid #2a3a63;background:#141d36;color:#e8eefb;cursor:pointer;transition:.15s;}
.btn:hover{border-color:#4f93ff;}
.btn.primary{background:linear-gradient(180deg,#3b82f6,#2563eb);border-color:transparent;color:#fff;}
.hint{font-size:12px;color:#7e8cb0;text-align:center;margin-top:14px;max-width:440px;line-height:1.5;}
input[type=file]{display:none;}
</style>
</head>
<body>
<div class="hd">
 <h1>INVOX Carousel</h1>
 <p>तुझ्या slide images अपलोड कर — त्याच carousel होईल (1:1)</p>
</div>

<!-- empty state -->
<label class="drop" id="drop" for="fileIn">
 <span class="big">🖼️</span>
 <b>⬆ Images अपलोड कर</b>
 <span>एकावेळी १० पर्यंत निवड · किंवा इथे drag-drop<br>क्रमाने नाव दिलं (1,2,3…) तर तोच क्रम राहील</span>
</label>
<input id="fileIn" type="file" accept="image/*" multiple>

<!-- carousel -->
<div class="frame" id="frame">
 <div class="track" id="track"></div>
 <button class="nav prev" id="prev" aria-label="Previous">‹</button>
 <button class="nav next" id="next" aria-label="Next">›</button>
 <div class="counter" id="counter">1 / 1</div>
</div>
<div class="dots" id="dots"></div>
<div class="thumbs" id="thumbs"></div>

<div class="actions" id="actions" style="display:none;">
 <label class="btn" for="fileIn">➕ आणखी images</label>
 <button class="btn" id="clear">🗑️ सगळे काढ</button>
</div>
<div class="hint" id="hint">Thumbnail drag करून क्रम बदल · × ने काढ · वरचे arrows/dots ने बघ</div>

<script>
var imgs=[]; // dataURLs
var idx=0;
var $=function(i){return document.getElementById(i);};
var drop=$('drop'),frame=$('frame'),track=$('track'),dots=$('dots'),thumbs=$('thumbs'),actions=$('actions'),counter=$('counter');

$('fileIn').addEventListener('change',function(e){addFiles(e.target.files);e.target.value='';});
['dragover','dragenter'].forEach(function(ev){drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.add('hot');});});
['dragleave','drop'].forEach(function(ev){drop.addEventListener(ev,function(e){e.preventDefault();drop.classList.remove('hot');});});
drop.addEventListener('drop',function(e){if(e.dataTransfer&&e.dataTransfer.files)addFiles(e.dataTransfer.files);});

function addFiles(files){
 var arr=Array.prototype.slice.call(files).filter(function(f){return f.type.indexOf('image/')===0;});
 arr.sort(function(a,b){return a.name.localeCompare(b.name,undefined,{numeric:true});});
 var pending=arr.length; if(!pending)return;
 arr.forEach(function(f){var r=new FileReader();r.onload=function(ev){imgs.push(ev.target.result);pending--;if(pending===0)render();};r.readAsDataURL(f);});
}

function render(){
 if(imgs.length===0){drop.style.display='flex';frame.style.display='none';actions.style.display='none';dots.innerHTML='';thumbs.innerHTML='';return;}
 drop.style.display='none';frame.style.display='block';actions.style.display='flex';
 if(idx>=imgs.length)idx=imgs.length-1; if(idx<0)idx=0;
 track.innerHTML=imgs.map(function(src){return '<div class="cell"><img src="'+src+'" alt=""></div>';}).join('');
 dots.innerHTML=imgs.map(function(_,i){return '<button class="'+(i===idx?'on':'')+'" data-i="'+i+'" aria-label="Slide '+(i+1)+'"></button>';}).join('');
 dots.querySelectorAll('button').forEach(function(b){b.addEventListener('click',function(){go(+b.dataset.i);});});
 thumbs.innerHTML=imgs.map(function(src,i){return '<div class="thumb '+(i===idx?'sel':'')+'" draggable="true" data-i="'+i+'"><img src="'+src+'"><span class="n">'+(i+1)+'</span><button class="x" data-x="'+i+'">×</button></div>';}).join('');
 wireThumbs();
 update();
}
function update(){track.style.transform='translateX(-'+(idx*100)+'%)';counter.textContent=(idx+1)+' / '+imgs.length;
 dots.querySelectorAll('button').forEach(function(b,i){b.classList.toggle('on',i===idx);});
 thumbs.querySelectorAll('.thumb').forEach(function(t,i){t.classList.toggle('sel',i===idx);});}
function go(k){idx=(k+imgs.length)%imgs.length;update();}

$('next').addEventListener('click',function(){go(idx+1);});
$('prev').addEventListener('click',function(){go(idx-1);});
$('clear').addEventListener('click',function(){imgs=[];idx=0;render();});
document.addEventListener('keydown',function(e){if(!imgs.length)return;if(e.key==='ArrowRight')go(idx+1);else if(e.key==='ArrowLeft')go(idx-1);});
var sx=0;frame.addEventListener('touchstart',function(e){sx=e.touches[0].clientX;},{passive:true});
frame.addEventListener('touchend',function(e){var dx=e.changedTouches[0].clientX-sx;if(dx<-40)go(idx+1);else if(dx>40)go(idx-1);},{passive:true});

var dragI=null;
function wireThumbs(){
 thumbs.querySelectorAll('.x').forEach(function(x){x.addEventListener('click',function(e){e.stopPropagation();imgs.splice(+x.dataset.x,1);render();});});
 thumbs.querySelectorAll('.thumb').forEach(function(t){
  t.addEventListener('click',function(){go(+t.dataset.i);});
  t.addEventListener('dragstart',function(){dragI=+t.dataset.i;});
  t.addEventListener('dragover',function(e){e.preventDefault();});
  t.addEventListener('drop',function(e){e.preventDefault();var to=+t.dataset.i;if(dragI===null||dragI===to)return;var m=imgs.splice(dragI,1)[0];imgs.splice(to,0,m);idx=to;dragI=null;render();});
 });
}
</script>
</body>
</html>
